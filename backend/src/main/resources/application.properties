spring.application.name=formora-backend

spring.mongodb.uri=${MONGODB_URI:mongodb+srv://localhost:5173/}
spring.mongodb.database=${MONGODB_DB_NAME:formora}
spring.data.mongodb.auto-index-creation=true

server.port=${PORT:3000}

formora.cors-origin=${CORS_ORIGIN:http://localhost:5173}
formora.session-ttl-hours=${SESSION_TTL_HOURS:168}
formora.secure-cookies=${SECURE_COOKIES:false}

logging.level.root=${LOG_LEVEL:INFO}
