name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Start MongoDB replica set
        run: docker compose up mongodb mongo-init -d --wait

      - name: Run MongoDB integration tests
        run: npm run test:integration -w @formora/api
        env:
          MONGODB_TEST_URI: mongodb://localhost:27017/formora-test?replicaSet=rs0&directConnection=true

      - name: Build
        run: npm run build
